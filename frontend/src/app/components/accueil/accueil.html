<div class="flex flex-col gap-6">

  <!-- Welcome banner -->
  <div class="rounded-2xl bg-[#008060] !p-6 flex items-center justify-between">
    <div class="flex flex-col gap-1">
      <h1 class="!text-white !text-2xl !font-bold">Bonjour 👋</h1>
      <p class="!text-white/80 !text-sm">Que voulez-vous pratiquer aujourd'hui ?</p>
    </div>
    <span class="text-5xl hidden sm:block">🇫🇷</span>
  </div>

  <!-- Section label -->
  <div class="flex items-center gap-3">
    <h3 class="!text-[#6d7175]">Modes disponibles</h3>
    <span class="flex-1 border-t border-[#e1e3e5]"></span>
    <p class="bg-[#008060] !px-3 !py-0.5 rounded-xl !text-white !text-xs">IA · Tuteur de français</p>
  </div>

  <!-- Mode cards -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
    @for (mode of modes; track mode.route) {
      <a [routerLink]="mode.route" class="mode-card">
        <div class="mode-card-icon">
          <mat-icon>{{ mode.icon }}</mat-icon>
        </div>
        <span class="mode-card-badge">{{ mode.badge }}</span>
        <h2 class="!text-lg !font-semibold !text-[#202223] !mt-3 !mb-2">{{ mode.title }}</h2>
        <p class="!text-sm !text-[#6d7175] !leading-relaxed">{{ mode.description }}</p>
        <div class="mode-card-cta">Commencer →</div>
      </a>
    }
  </div>
</div>
